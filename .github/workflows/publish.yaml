# Publishes @florian-trehaut/bmad-global to npm when a v* tag is pushed.
#
# Authentication: npm OIDC trusted publishing (no NPM_TOKEN needed).
#   Setup on https://www.npmjs.com/settings/florian-trehaut/packages
#   → Trusted Publishers → Add GitHub:
#     - Organization/user: florian-trehaut
#     - Repository: bmad-global
#     - Workflow file: publish.yaml
#     - Environment: (blank)
#
# Flow:
#   1. changelog skill (local) → writes CHANGELOG.md, bumps package.json,
#      commits, tags vX.Y.Z, and pushes main + tag.
#   2. This workflow fires on the tag push, verifies version coherence,
#      runs tests, publishes via OIDC, and creates a GitHub Release.
#
# Manual replay: workflow_dispatch from an existing vX.Y.Z tag ref.

name: Publish

"on":
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # npm OIDC trusted publishing
  contents: write # gh release create

jobs:
  publish:
    if: github.repository == 'florian-trehaut/bmad-global'
    runs-on: ubuntu-latest
    steps:
      - name: Validate trigger ref is a v* tag
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF" != refs/tags/v* ]]; then
            echo "::error::Publish only runs from a tag matching v*. Current ref: $REF"
            exit 1
          fi
          TAG_VERSION="${REF_NAME#v}"
          echo "TAG_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $TAG_VERSION"

      - name: Checkout (full history for CHANGELOG extraction)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure trusted publishing toolchain
        # npm OIDC trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p 'require("./package.json").version')
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag/package.json mismatch: tag=$TAG_VERSION, package.json=$PKG_VERSION"
            exit 1
          fi
          echo "Version coherence OK ($PKG_VERSION)"

      - name: Run tests
        run: npm test

      - name: Publish to npm (stable, OIDC provenance)
        run: npm publish --tag latest --provenance --access public

      - name: Create GitHub Release from CHANGELOG section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$TAG_VERSION"
          BODY=$(awk -v ver="$TAG_VERSION" '
            /^## v/ { if (found) exit; if (index($0, "## v" ver)) found=1; next }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "::warning::No CHANGELOG.md entry for $TAG — falling back to auto-generated notes"
            gh release create "$TAG" --generate-notes
          else
            gh release create "$TAG" --notes "$BODY"
          fi
